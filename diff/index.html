<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article Diff | Legalize PK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"
    />
    <link rel="stylesheet" href="/ui/styles/main.css" />
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/ui/scripts/pages/diff.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="brand" href="/"><span class="brand__mark">LP</span><span>Legalize PK</span></a>
          <nav class="site-nav" aria-label="Primary">
            <a href="/" data-nav-key="home">Home</a>
            <a href="/constitution" data-nav-key="constitution">Current Constitution</a>
            <a href="/explore" data-nav-key="explore">Explore</a>
            <a href="/timeline" data-nav-key="timeline">Timeline</a>
            <a href="/search" data-nav-key="search">Search</a>
          </nav>
        </div>
      </header>

      <main class="page">
        <section class="page-intro">
          <p class="page-kicker">Article Evolve</p>
          <h1 class="page-title">Compare Two Constitutional States</h1>
          <p class="page-subtitle">Choose an article and two commit hashes to see the legal text changes.</p>
          <div data-diff-status></div>
        </section>

        <section class="diff-controls" aria-label="Diff controls">
          <label>
            Article
            <select id="diff-article"></select>
          </label>
          <label>
            From
            <select id="diff-from"></select>
          </label>
          <label>
            To
            <select id="diff-to"></select>
          </label>
          <label>
            View
            <select id="diff-mode">
              <option value="unified">Unified</option>
              <option value="split">Side by side</option>
            </select>
          </label>
          <div>
            <button class="button button--primary" data-run-diff type="button">Run Comparison</button>
          </div>
        </section>

        <section data-diff-output></section>
        <div class="error-slot" data-diff-error></div>
      </main>
    </div>
  </body>
</html>
