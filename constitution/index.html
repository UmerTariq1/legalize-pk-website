<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Current Constitution | Legalize PK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"
    />
    <link rel="stylesheet" href="/ui/styles/main.css" />
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/ui/scripts/pages/constitution.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="brand" href="/"><span class="brand__mark" aria-hidden="true"><i data-lucide="landmark" class="brand__mark-icon"></i></span><span class="brand__name">Legalize PK</span></a>
          <nav class="site-nav" aria-label="Primary">
            <a href="/" data-nav-key="home">Home</a>
            <a href="/constitution" data-nav-key="constitution">Current Constitution</a>
            <a href="/explore" data-nav-key="explore">Explore</a>
            <a href="/timeline" data-nav-key="timeline">Timeline</a>
            <a href="/search" data-nav-key="search">Search</a>
          </nav>
        </div>
      </header>

      <main class="page">
        <section class="page-intro">
          <p class="page-kicker">Current Text</p>
          <h1 class="page-title">Current Constitution</h1>
          <p class="page-subtitle">
            Browse the latest constitutional article text with first-added and last-updated context from local JSON.
          </p>
          <div class="meta-stack">
            <span class="badge badge--gold" data-article-count>Loading...</span>
          </div>
        </section>

        <section class="search-toolbar" aria-label="Article filter controls">
          <input
            id="constitution-search"
            type="search"
            placeholder="Filter by article number, title, or text"
            autocomplete="off"
          />
          <button class="button button--ghost" type="button" data-clear-constitution-search>Clear</button>
        </section>

        <section class="constitution-list-shell">
          <section class="article-list" data-constitution-list></section>
        </section>
        <div class="error-slot" data-constitution-error></div>
      </main>
    </div>
  </body>
</html>
