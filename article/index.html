<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article History | Legalize PK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"
    />
    <link rel="stylesheet" href="/ui/styles/main.css" />
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/ui/scripts/pages/article.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="brand" href="/"><span class="brand__mark" aria-hidden="true"><i data-lucide="landmark" class="brand__mark-icon"></i></span><span class="brand__name">Legalize PK</span></a>
          <nav class="site-nav" aria-label="Primary">
            <a href="/" data-nav-key="home">Home</a>
            <a href="/constitution" data-nav-key="constitution">Current Constitution</a>
            <a href="/explore" data-nav-key="explore">Explore</a>
            <a href="/timeline" data-nav-key="timeline">Timeline</a>
            <a href="/search" data-nav-key="search">Search</a>
          </nav>
        </div>
      </header>

      <main class="page">
        <section class="page-intro">
          <p class="page-kicker">Article History</p>
          <h1 class="page-title" data-article-heading>Loading article...</h1>
          <p class="page-subtitle" data-article-subtitle></p>
          <div class="meta-stack" data-article-meta></div>
          <div data-proxy-status></div>
        </section>

        <section class="layout-with-panel">
          <section class="commit-list-shell" aria-label="Amendment history cards">
            <p class="commit-list__affordance">Click an amendment to see its details and historical text</p>
            <div class="commit-list" data-commit-list></div>
          </section>
          <aside class="summary-panel" data-summary-panel></aside>
        </section>

        <div class="error-slot" data-article-error></div>
      </main>
    </div>
  </body>
</html>
