<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constitution Timeline | Legalize PK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"
    />
    <link rel="stylesheet" href="/ui/styles/main.css" />
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/ui/scripts/pages/timeline.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="brand" href="/"><span class="brand__mark" aria-hidden="true"><i data-lucide="landmark" class="brand__mark-icon"></i></span><span class="brand__name">Legalize PK</span></a>
          <nav class="site-nav" aria-label="Primary">
            <a href="/" data-nav-key="home">Home</a>
            <a href="/constitution" data-nav-key="constitution">Current Constitution</a>
            <a href="/explore" data-nav-key="explore">Explore</a>
            <a href="/timeline" data-nav-key="timeline">Timeline</a>
            <a href="/search" data-nav-key="search">Search</a>
          </nav>
        </div>
      </header>

      <main class="page">
        <section class="page-intro">
          <p class="page-kicker">Constitution Timeline</p>
          <h1 class="page-title">What Changed in My Lifetime?</h1>
          <p class="page-subtitle">
            Filter constitutional events by date and share your timeline with URL parameters.
          </p>
        </section>

        <section class="timeline-filter" aria-label="Timeline date filters">
          <div class="timeline-filter__dates">
            <label>
              From
              <input id="timeline-from" type="date" />
            </label>
            <label>
              To
              <input id="timeline-to" type="date" />
            </label>
          </div>
          <div class="timeline-filter__presets" data-timeline-presets>
            <button type="button" class="timeline-filter__preset" data-range-preset="all" aria-pressed="false">All Time</button>
            <button type="button" class="timeline-filter__preset" data-range-preset="century21" aria-pressed="false">Since 2000</button>
            <button type="button" class="timeline-filter__preset" data-range-preset="post18" aria-pressed="false">Post-18th</button>
            <button type="button" class="timeline-filter__preset" data-range-preset="recent15" aria-pressed="false">Recent 15 Years</button>
          </div>
          <button class="button button--secondary" type="button" data-reset-range>Reset</button>
          <span class="badge badge--gold" data-range-count>Loading...</span>
        </section>

        <section class="timeline-track" data-timeline-track></section>
        <div class="error-slot" data-timeline-error></div>
      </main>
    </div>
  </body>
</html>
